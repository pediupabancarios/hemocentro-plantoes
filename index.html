  // ══════════════════════════════════════════

  function fmtTime(ts) {
    if (!ts) return "—";
    try { return new Date(ts).toLocaleString("pt-BR"); } catch { return ts; }
  }
  function nowStr() { return new Date().toLocaleString("pt-BR"); }
  function durStr(inicio, fim) {
    if (!inicio) return "—";
    const end = fim ? new Date(fim) : new Date();
    const min = Math.round((end - new Date(inicio)) / 60000);
    return min < 60 ? min + " min" : Math.floor(min/60) + "h " + (min%60) + "min";
  }

  async function doLogin() {
    const crm = document.getElementById("inp-crm").value.trim();
    const senha = document.getElementById("inp-senha").value.trim();
    const err = document.getElementById("login-err");
    if (!crm||!senha) { err.style.display="block"; err.textContent="⚠ Preencha CRM e senha."; return; }
    err.style.display="none";
    document.getElementById("btn-login").textContent="Verificando...";
    try {
      const snap = await get(ref(db, `medicos/crm_${crm}`));
      if (!snap.exists()) { err.style.display="block"; err.textContent="⚠ CRM não encontrado."; document.getElementById("btn-login").textContent="Entrar"; return; }
      const data = snap.val();
      if (data.senha !== senha) { err.style.display="block"; err.textContent="⚠ Senha incorreta."; document.getElementById("btn-login").textContent="Entrar"; return; }
      currentUser = { ...data, key: `crm_${crm}` };
      sessionStorage.setItem("hemo_user", JSON.stringify(currentUser));
      startListeners();
    } catch(e) {
      err.style.display="block"; err.textContent="⚠ Erro de conexão.";
      document.getElementById("btn-login").textContent="Entrar";
    }
  }

      <table><thead><tr><th>Médico</th><th>CRM</th><th>Setor</th><th>Início</th><th>Fim</th><th>Duração</th><th>Status</th><th>Ação</th></tr></thead><tbody>
      ${plantoes.length===0?'<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">Nenhum registro</td></tr>':
      plantoes.sort((a,b)=>new Date(b.inicio)-new Date(a.inicio)).map(p=>`<tr>
        <td><strong>${p.medicoNome}</strong></td>
        <td>${p.medicoCrm}</td>
        <td>${p.setorNome}</td>
        <td><span style="font-family:monospace;font-size:12px">${fmtTime(p.inicio)}</span></td>

  function renderGestorMedicos(medicos) {
    return `
    <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center">
      <h2 style="font-weight:700;font-size:20px;color:#1a1a2e">Médicos</h2>

    <div class="card">
      <table><thead><tr><th>Nome</th><th>CRM</th><th>Matrícula</th><th>Setor</th><th>Ações</th></tr></thead><tbody>

        <td>
          <select style="padding:4px 6px;font-size:12px" onchange="editarSetorMedico('${m.key}',this.value)">

  function renderRelatorios(plantoes, medicos) {
    const ativos = plantoes.filter(p=>p.status==="ativo");
    const enc = plantoes.filter(p=>p.status==="encerrado");
    const totalMin = enc.reduce((a,p)=>p.fim&&p.inicio?a+Math.round((new Date(p.fim)-new Date(p.inicio))/60000):a,0);
    return `
    <h2 style="font-weight:700;font-size:20px;color:#1a1a2e;margin-bottom:16px">Relatórios</h2>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px">
      ${[
        {l:"Plantões Ativos",v:ativos.length,c:"#2E7D32"},
        {l:"Plantões Encerrados",v:enc.length,c:"#FF9800"},
        {l:"Total de Plantões",v:plantoes.length,c:"#1565C0"},
        {l:"Horas Trabalhadas",v:Math.floor(totalMin/60)+"h "+(totalMin%60)+"min",c:"#9C27B0"},
      ].map(r=>`<div class="card"><div style="font-size:13px;color:#90A4AE">${r.l}</div><div style="font-weight:800;font-size:28px;color:${r.c};margin-top:4px">${r.v}</div></div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
      ${[
        {tipo:"chegada",icon:"📄",title:"Relatório de Chegada",desc:"Horários de início dos plantões",cor:"#EF5350"},
        {tipo:"fechamento",icon:"📊",title:"Relatório de Fechamento",desc:"Horários de saída dos plantões",cor:"#4CAF50"},
        {tipo:"completo",icon:"📋",title:"Relatório Completo",desc:"Todos os plantões com durações",cor:"#2196F3"},
        {tipo:"ausencias",icon:"📉",title:"Relatório de Ausências",desc:"Médicos sem plantão registrado",cor:"#FF5722"},
      ].map(r=>`<div class="card">
        <div style="display:flex;gap:12px">
          <span style="font-size:32px">${r.icon}</span>
          <div style="flex:1">
            <div style="font-weight:700;color:#1a1a2e;margin-bottom:4px">${r.title}</div>
            <div style="font-size:12px;color:#90A4AE;margin-bottom:12px">${r.desc}</div>
            <button style="background:${r.cor};color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer" onclick="gerarRelatorio('${r.tipo}')">⬇ Gerar e Baixar</button>
          </div>
        </div>
      </div>`).join("")}
    </div>`;
  }

  function renderNotifs(notifs) {
    return `
    <h2 style="font-weight:700;font-size:20px;margin-bottom:16px">Notificações em Tempo Real</h2>
    <div class="card">

        <div style="flex:1"><div style="font-size:13px;color:#333">${n.texto}</div><div style="font-size:11px;color:#90A4AE;margin-top:2px">${n.hora}</div></div>
      </div>`).join("")}
    </div>`;
  }

  // ══════════════════════════════════════════
  // PLANTONISTA DASHBOARD
  // ══════════════════════════════════════════
  function renderPlantonista() {
    const meusList = Object.entries(plantoesData).map(([k,v])=>({...v,key:k})).filter(p=>p.medicoKey===currentUser.key);
    const ativo = meusList.find(p=>p.status==="ativo")||null;
    const todos = meusList.sort((a,b)=>new Date(b.inicio)-new Date(a.inicio));
    const ativos = Object.entries(plantoesData).map(([k,v])=>({...v,key:k})).filter(p=>p.status==="ativo");

    document.body.innerHTML = `
    <style>

      @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

      <div style="display:flex;align-items:center;gap:12px">
        <span class="liveTag">● AO VIVO</span>
        <div style="text-align:right"><div style="color:#fff;font-size:13px;font-weight:600">${currentUser.nome.split(" ")[0]}</div><div style="color:#90A4AE;font-size:11px">CRM ${currentUser.crm}</div></div>
        <button onclick="doLogout()" style="background:none;border:1px solid #546E7A;color:#90A4AE;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px">Sair</button>
      </div>
    </div>
    <div style="max-width:700px;margin:0 auto;padding:20px 16px">
      <!-- Bater Ponto -->
      <div class="card">
        <div style="font-weight:700;font-size:16px;color:#1a1a2e;margin-bottom:14px">🕐 Bater Ponto</div>
        <div style="background:#F7F9FC;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">🕐</span>
          <span id="clock" style="font-family:monospace;font-size:14px;color:#333;font-weight:600">${new Date().toLocaleString("pt-BR")}</span>
        </div>
        ${ativo?`
        <div style="background:#E8F5E9;border-radius:10px;padding:12px 16px;margin-bottom:14px;border:1px solid #C8E6C9">
          <div style="color:#2E7D32;font-weight:700;font-size:14px;margin-bottom:4px">✅ Plantão em andamento</div>
          <div style="color:#555;font-size:13px">Setor: <strong>${ativo.setorNome}</strong></div>
          <div style="color:#555;font-size:13px">Iniciado em: <strong style="font-family:monospace">${fmtTime(ativo.inicio)}</strong></div>
          <div style="color:#555;font-size:13px">Duração: <strong>${durStr(ativo.inicio,null)}</strong></div>
        </div>`:`
        <div style="background:#FFF3E0;border-radius:10px;padding:12px 16px;margin-bottom:14px;border:1px solid #FFE0B2">
          <div style="color:#E65100;font-weight:600;font-size:13px">⏸ Nenhum plantão ativo. Clique em "Iniciar Plantão" para registrar sua entrada.</div>
        </div>`}
        <div id="ponto-msg"></div>
        <button onclick="iniciarPlantonista()" ${ativo?'disabled':''} style="background:${ativo?'#E0E7EF':'#2E7D32'};color:${ativo?'#aaa':'#fff'};border:none;border-radius:10px;padding:14px 0;width:100%;font-weight:700;font-size:16px;cursor:${ativo?'not-allowed':'pointer'};margin-bottom:10px">▶ Iniciar Plantão</button>
        <button onclick="encerrarPlantonista('${ativo?.key||''}')" ${!ativo?'disabled':''} style="background:${!ativo?'#E0E7EF':'#C62828'};color:${!ativo?'#aaa':'#fff'};border:none;border-radius:10px;padding:14px 0;width:100%;font-weight:700;font-size:16px;cursor:${!ativo?'not-allowed':'pointer'}">■ Encerrar Plantão</button>
      </div>
      <!-- Dados -->
      <div class="card">
        <div style="font-weight:700;font-size:16px;color:#1a1a2e;margin-bottom:14px">👤 Meus Dados</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${[["Nome",currentUser.nome],["CRM",currentUser.crm],["Matrícula",currentUser.matricula||"—"],["Setor",currentUser.setor||"A definir"]].map(([l,v])=>`
          <div style="background:#F7F9FC;border-radius:8px;padding:10px 12px">
            <div style="font-size:11px;color:#90A4AE;font-weight:600">${l}</div>
            <div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-top:2px">${v}</div>
          </div>`).join("")}
        </div>
      </div>
      <!-- Histórico -->
      <div class="card">
        <div style="font-weight:700;font-size:16px;color:#1a1a2e;margin-bottom:14px">📋 Meu Histórico de Plantões</div>
        ${todos.length===0?'<div style="color:#aaa;font-size:14px;text-align:center;padding:16px">Nenhum plantão registrado ainda.</div>':`
        <table><thead><tr><th>Setor</th><th>Início</th><th>Fim</th><th>Duração</th><th>Status</th></tr></thead><tbody>
        ${todos.map(p=>`<tr>
          <td>${p.setorNome}</td>
          <td><span style="font-family:monospace;font-size:12px">${fmtTime(p.inicio)}</span></td>
          <td><span style="font-family:monospace;font-size:12px">${fmtTime(p.fim)}</span></td>
          <td>${durStr(p.inicio,p.fim)}</td>
          <td><span style="background:${p.status==='ativo'?'#E8F5E9':'#F0F4F8'};color:${p.status==='ativo'?'#2E7D32':'#555'};border-radius:20px;padding:2px 10px;font-size:12px;font-weight:500">● ${p.status}</span></td>
        </tr>`).join("")}
        </tbody></table>`}
      </div>
      <!-- Escala ao vivo -->
      <div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-weight:700;font-size:16px;color:#1a1a2e">Escala de Hoje</span>
          <span class="liveTag" style="font-size:10px">● TEMPO REAL</span>
        </div>
        ${SETORES.map(s=>{
          const neste = ativos.filter(p=>p.setorId===s.id);
          return `<div style="margin-bottom:14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div style="width:28px;height:28px;border-radius:8px;background:${s.cor}22;display:flex;align-items:center;justify-content:center;font-size:14px">${s.icone}</div>
              <span style="font-weight:700;color:${s.cor};font-size:14px">${s.nome}</span>
              <span style="font-size:12px;color:#aaa">(${neste.length}/${s.vagas})</span>
            </div>
            ${neste.length===0?'<div style="font-size:13px;color:#aaa;padding-left:36px">Sem médicos no plantão</div>':
            neste.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding-left:36px;padding-bottom:4px">
              <span style="font-size:13px;color:#333;font-weight:${p.medicoKey===currentUser.key?700:400}">${p.medicoNome}${p.medicoKey===currentUser.key?' 👈 (você)':''}</span>
              <span style="font-size:11px;color:#90A4AE;font-family:monospace">desde ${fmtTime(p.inicio)}</span>
            </div>`).join("")}
          </div>`;
        }).join("")}
      </div>
    </div>`;

    if (clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(() => {
      const el = document.getElementById("clock");
      if (el) el.textContent = new Date().toLocaleString("pt-BR");
      else clearInterval(clockInterval);
    }, 1000);
  }

  // ══════════════════════════════════════════
  // ACTIONS
  // ══════════════════════════════════════════
  window.changePage = function(p) { activePage=p; render(); }
  window.doLogout = function() { currentUser=null; sessionStorage.removeItem("hemo_user"); if(clockInterval)clearInterval(clockInterval); render(); }

  window.openModal = function(tipo) {
    const mc = document.getElementById("modal-container");
    if (tipo==="novoPlantao") {
      const medicoList = Object.entries(medicosData).map(([k,v])=>({...v,key:k})).filter(m=>m.role!=="gestor");
      mc.innerHTML = `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head"><span style="font-weight:700;font-size:16px">Iniciar Plantão</span><button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#999">✕</button></div>
        <div class="modal-body">
          <label>Médico</label>
          <select id="m-medico"><option value="">Selecione...</option>${medicoList.map(m=>`<option value="${m.key}">${m.nome} — CRM ${m.crm}</option>`).join("")}</select>
          <label>Setor</label>
          <select id="m-setor"><option value="">Selecione...</option>${SETORES.map(s=>`<option value="${s.id}">${s.icone} ${s.nome}</option>`).join("")}</select>
          <div style="display:flex;gap:8px;margin-top:20px">
            <button class="btn-primary" onclick="salvarPlantao()">✅ Iniciar</button>
            <button style="background:#eee;color:#555;border:none;border-radius:8px;padding:9px 18px;font-weight:600" onclick="closeModal()">Cancelar</button>
          </div>
        </div>
      </div></div>`;
    } else if (tipo==="novoMedico") {
      mc.innerHTML = `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head"><span style="font-weight:700;font-size:16px">Cadastrar Médico</span><button onclick="closeModal()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#999">✕</button></div>
        <div class="modal-body">
          <label>Nome completo</label><input id="m-nome" placeholder="Dr(a). Nome Sobrenome"/>
          <label>CRM (só números)</label><input id="m-crm" placeholder="Ex: 19644"/>
          <label>Matrícula</label><input id="m-mat" placeholder="Ex: 929.841-0"/>
          <label>Setor</label><select id="m-setor2"><option value="">Sem setor</option>${SETORES.map(s=>`<option value="${s.nome}">${s.icone} ${s.nome}</option>`).join("")}</select>
          <label>Senha inicial</label><input id="m-senha" value="1234"/>
          <div style="display:flex;gap:8px;margin-top:20px">
            <button class="btn-primary" onclick="salvarMedico()">Salvar</button>
            <button style="background:#eee;color:#555;border:none;border-radius:8px;padding:9px 18px;font-weight:600" onclick="closeModal()">Cancelar</button>
          </div>
        </div>
      </div></div>`;
    }
  }

  window.closeModal = function() { document.getElementById("modal-container").innerHTML=""; }

  window.salvarPlantao = async function() {
    const mk = document.getElementById("m-medico").value;
    const sk = document.getElementById("m-setor").value;
    if (!mk||!sk) return alert("Selecione médico e setor!");
    const medico = medicosData[mk];
    const setor = SETORES.find(s=>s.id===sk);
    await push(ref(db,"plantoes"), { medicoKey:mk, medicoNome:medico.nome, medicoCrm:medico.crm, setorId:sk, setorNome:setor.nome, status:"ativo", inicio:new Date().toISOString(), fim:null });
    await push(ref(db,"notificacoes"), { tipo:"inicio", texto:`${medico.nome} iniciou plantão em ${setor.nome}`, hora:nowStr(), cor:"green" });
    closeModal();
  }

  window.encerrarPlantao = async function(key, nome, setor) {
    if (!confirm(`Encerrar plantão de ${nome}?`)) return;
    await update(ref(db,`plantoes/${key}`), { status:"encerrado", fim:new Date().toISOString() });
    await push(ref(db,"notificacoes"), { tipo:"fim", texto:`${nome} encerrou plantão em ${setor}`, hora:nowStr(), cor:"red" });
  }

  window.salvarMedico = async function() {
    const nome = document.getElementById("m-nome").value.trim();
    const crm = document.getElementById("m-crm").value.trim();
    if (!nome||!crm) return alert("Nome e CRM são obrigatórios!");
    await set(ref(db,`medicos/crm_${crm}`), { crm, nome, matricula:document.getElementById("m-mat").value, funcao:"Médico(a)", setor:document.getElementById("m-setor2").value, role:"plantonista", senha:document.getElementById("m-senha").value||"1234" });
    closeModal();
  }

  window.editarSetorMedico = async function(key, setor) {
    await update(ref(db,`medicos/${key}`), { setor });
  }

  window.resetarSenha = async function(key, nome) {
    if (!confirm(`Resetar senha de ${nome} para 1234?`)) return;
    await update(ref(db,`medicos/${key}`), { senha:"1234" });
    alert("Senha resetada para 1234!");
  }

  window.iniciarPlantonista = async function() {
    await push(ref(db,"plantoes"), { medicoKey:currentUser.key, medicoNome:currentUser.nome, medicoCrm:currentUser.crm, setorId:null, setorNome:currentUser.setor||"A definir", status:"ativo", inicio:new Date().toISOString(), fim:null });
    await push(ref(db,"notificacoes"), { tipo:"inicio", texto:`${currentUser.nome} iniciou plantão em ${currentUser.setor||"setor a definir"}`, hora:nowStr(), cor:"green" });
  }

  window.encerrarPlantonista = async function(key) {
    if (!key) return;
    await update(ref(db,`plantoes/${key}`), { status:"encerrado", fim:new Date().toISOString() });
    await push(ref(db,"notificacoes"), { tipo:"fim", texto:`${currentUser.nome} encerrou plantão`, hora:nowStr(), cor:"red" });
  }

  window.gerarRelatorio = function(tipo) {
    const plantoes = Object.values(plantoesData);
    const medicos = Object.values(medicosData).filter(m=>m.role!=="gestor");
    const hoje = new Date().toLocaleDateString("pt-BR");
    let linhas = [];
    if (tipo==="chegada") {
      linhas = ["RELATÓRIO DE CHEGADA — "+hoje,"=".repeat(60),"Médico | CRM | Setor | Início","-".repeat(60),
        ...plantoes.map(p=>`${p.medicoNome} | CRM ${p.medicoCrm} | ${p.setorNome} | ${fmtTime(p.inicio)}`)];
    } else if (tipo==="fechamento") {
      linhas = ["RELATÓRIO DE FECHAMENTO — "+hoje,"=".repeat(60),
        ...plantoes.filter(p=>p.fim).map(p=>`${p.medicoNome} | CRM ${p.medicoCrm} | ${p.setorNome} | Início: ${fmtTime(p.inicio)} | Fim: ${fmtTime(p.fim)} | ${durStr(p.inicio,p.fim)}`)];
    } else if (tipo==="completo") {
      linhas = ["RELATÓRIO COMPLETO DE PLANTÕES","=".repeat(60)];
      plantoes.forEach(p=>{ linhas.push(`[${p.status.toUpperCase()}] ${p.medicoNome} | CRM ${p.medicoCrm}`); linhas.push(`  Setor: ${p.setorNome} | Início: ${fmtTime(p.inicio)} | Fim: ${fmtTime(p.fim)} | Duração: ${durStr(p.inicio,p.fim)}`); linhas.push(""); });
    } else if (tipo==="ausencias") {
      const comPlantao = new Set(plantoes.map(p=>p.medicoKey));
      linhas = ["RELATÓRIO DE AUSÊNCIAS — "+hoje,"=".repeat(60),
        ...medicos.filter(m=>!comPlantao.has(m.key||`crm_${m.crm}`)).map(m=>`${m.nome} | CRM ${m.crm} | ${m.setor||"Sem setor"}`)];
    }
    const blob = new Blob([linhas.join("\n")], {type:"text/plain;charset=utf-8"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`relatorio_${tipo}_${hoje.replace(/\//g,"-")}.txt`; a.click();
  }

  // ══════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════
  async function init() {
    await seedIfEmpty();
    if (currentUser) startListeners();
    else render();
  }

  init();
</script>
