*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;background:#F0F4F8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ring{0%{transform:rotate(0)}20%{transform:rotate(15deg)}40%{transform:rotate(-15deg)}60%{transform:rotate(10deg)}80%{transform:rotate(-5deg)}100%{transform:rotate(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── APP SHELL ── */
#app{display:flex;height:100vh;min-height:-webkit-fill-available;overflow:hidden;position:relative;width:100%}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;backdrop-filter:blur(2px)}

#sidebar{position:fixed;top:0;left:0;height:100vh;width:260px;background:linear-gradient(180deg,#0a1628 0%,#0D1B2A 100%);display:flex;flex-direction:column;z-index:101;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto}
#sidebar.open{transform:translateX(0)}
@media(min-width:768px){#sidebar{position:relative;transform:translateX(0)!important;flex-shrink:0}#sidebar-overlay{display:none!important}#btn-menu{display:none}}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:58px;border-bottom:1px solid #E8EDF5;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.06)}
#content{flex:1;overflow-y:auto;padding:16px;animation:fadeIn .25s ease}

/* ── CARDS ── */
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px}
.card-title{font-weight:700;font-size:15px;color:#1a1a2e;margin-bottom:14px}

/* ── GRID ── */

@media(min-width:600px){.sector-grid{grid-template-columns:repeat(4,1fr)}}
.two-col{display:flex;flex-direction:column;gap:14px}
@media(min-width:768px){.two-col{flex-direction:row}}
.col-main{flex:1.6;min-width:0}.col-side{flex:0.85;min-width:0}

/* ── NAV ── */

.nav-btn:hover,.nav-btn:active{background:#1a2d42;color:#fff}
.nav-btn.active{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,.3)}

/* ── BUTTONS ── */

.btn:active{transform:scale(.97)}
.btn-blue{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;box-shadow:0 3px 10px rgba(21,101,192,.3)}
.btn-green{background:linear-gradient(135deg,#2E7D32,#388E3C);color:#fff;box-shadow:0 3px 10px rgba(46,125,50,.3)}
.btn-red{background:linear-gradient(135deg,#C62828,#D32F2F);color:#fff;box-shadow:0 3px 10px rgba(198,40,40,.3)}
.btn-danger{background:#FFEBEE;color:#C62828;padding:5px 12px;font-size:12px;border-radius:8px}
.btn-success{background:#E8F5E9;color:#2E7D32;padding:5px 12px;font-size:12px;border-radius:8px}
.btn-gray{background:#F0F4F8;color:#555}
.btn-full{width:100%;padding:15px;font-size:16px;border-radius:14px;letter-spacing:.3px}
.btn-disabled{background:#E0E7EF!important;color:#aaa!important;cursor:not-allowed!important;box-shadow:none!important}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;font-size:11px;color:#90A4AE;font-weight:700;padding:8px 10px;border-bottom:2px solid #F0F4F8;text-transform:uppercase;letter-spacing:.5px}
td{padding:11px 10px;font-size:13px;color:#333;vertical-align:middle}
tr{border-bottom:1px solid #F5F7FA;transition:background .1s}

/* ── BADGES ── */

/* ── MODAL ── */

/* ── INPUTS ── */
label{display:block;font-weight:600;font-size:13px;color:#444;margin-bottom:6px;margin-top:14px}
input,select,textarea{width:100%;border:2px solid #E8EDF5;border-radius:12px;padding:14px 16px;font-size:16px!important;outline:none;font-family:inherit;background:#fff!important;-webkit-appearance:none;appearance:none;-webkit-user-select:text!important;user-select:text!important;touch-action:manipulation;color:#1a1a2e;display:block;box-sizing:border-box;-webkit-text-fill-color:#1a1a2e;opacity:1}

/* ── TOAST ── */

.toast-inner{background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;white-space:nowrap}

/* ── AVATAR ── */

.avatar-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #E8EDF5}

/* ── PONTO CARD ── */

.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:10px}

/* ── BOTTOM NAV ── */
#bottom-nav{display:flex;background:#fff;border-top:1px solid #E8EDF5;position:fixed;bottom:0;left:0;right:0;z-index:50;box-shadow:0 -4px 16px rgba(0,0,0,.08);padding-bottom:env(safe-area-inset-bottom)}
.bottom-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-size:10px;font-weight:700;color:#90A4AE;gap:4px;transition:color .2s;touch-action:manipulation}

.bottom-btn .b-icon{font-size:22px;transition:transform .2s}

.notif-badge{position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#F44336;border-radius:50%;border:2px solid #fff}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;min-height:-webkit-fill-available;width:100vw;background:linear-gradient(160deg,#0a1628 0%,#1565C0 50%,#0a1628 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:fixed;top:0;left:0;right:0;bottom:0}

/* ── PROFILE UPLOAD ── */

.avatar-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

</style>

// ── STATE ──
let user = JSON.parse(sessionStorage.getItem("hemo_user")||"null");

// ── HELPERS ──
const fmtTime = ts => { try{ return new Date(ts).toLocaleString("pt-BR"); }catch{ return "—"; }};
const nowStr = () => new Date().toLocaleString("pt-BR");
const durStr = (i,f) => {
  if(!i) return "—";
  const m=Math.round((new Date(f||Date.now())-new Date(i))/60000);
  if(m<1) return "< 1min";
  return m<60?m+"min":Math.floor(m/60)+"h"+(m%60?` ${m%60}min`:"");
};
const $ = id => document.getElementById(id);
const stopClock = () => { if(clockTick){clearInterval(clockTick);clockTick=null;}};
const stopListeners = () => { listeners.forEach(u=>u()); listeners=[]; };
const initials = nome => nome.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase();

function avatarHTML(foto, nome, size="md"){
  const cls = size==="sm"?"avatar-sm":"avatar";
  if(foto) return `<img src="${foto}" class="${cls}" alt="${nome}"/>`;
  const bg = stringToColor(nome);
  const fs = size==="sm"?"13px":"16px";
  const sz = size==="sm"?"36px":"48px";
  return `<div class="${cls} avatar-initials" style="background:${bg};width:${sz};height:${sz};font-size:${fs}">${initials(nome)}</div>`;
}

function stringToColor(s){
  const colors=["#1565C0","#7B1FA2","#00838F","#2E7D32","#C62828","#E65100","#1976D2","#6A1B9A"];
  let h=0; for(let c of s) h=(h*31+c.charCodeAt(0))%colors.length;
  return colors[h];
}

// ── TOAST ──
function toast(msg, emoji="✅", dur=3000){
  const t=$("toast");
  if(!t) return;
  t.innerHTML=`<div class="toast-inner">${emoji} ${msg}</div>`;
  t.style.opacity="1";
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.opacity="0"; setTimeout(()=>{ if(t) t.innerHTML=""; },300); }, dur);
}

// ── SOUND & VIBRATION ──
function playSound(type){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type==="start"){
      osc.frequency.setValueAtTime(523,audioCtx.currentTime);
      osc.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);
      osc.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);
      gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.5);
    } else if(type==="end"){
      osc.frequency.setValueAtTime(784,audioCtx.currentTime);
      osc.frequency.setValueAtTime(523,audioCtx.currentTime+0.15);
      gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.5);
    } else {
      osc.frequency.setValueAtTime(440,audioCtx.currentTime);
      gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
      osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.3);
    }
  }catch(e){}
  try{ if(type==="start") navigator.vibrate&&navigator.vibrate([100,50,100]); else if(type==="end") navigator.vibrate&&navigator.vibrate([200]); }catch(e){}
}

function checkNewNotifs(){
  const count=Object.keys(notifDB).length;
  if(count>lastNotifCount && lastNotifCount>0){
    const notifs=Object.values(notifDB);
    const last=notifs[notifs.length-1];
    playSound("notif");
    toast(last?.texto||"Nova notificação","🔔");
  }
  lastNotifCount=count;
}

// ── SEED ──
async function seedIfEmpty(){
  const s=await get(ref(db,"medicos/crm_11707"));
  if(!s.exists()){
    await set(ref(db,"medicos"),MEDICOS_SEED);
    const obj={};
    SETORES.forEach(s=>obj[s.id]=s);
    await set(ref(db,"setores"),obj);
  }
}

// ── LISTENERS ──
function startListeners(){
  stopListeners();
  listeners.push(onValue(ref(db,"medicos"),s=>{medicosDB=s.val()||{};render();}));
  listeners.push(onValue(ref(db,"plantoes"),s=>{plantoesDB=s.val()||{};render();}));

  listeners.push(onValue(ref(db,"anuncios"),s=>{anunciosDB=s.val()||{};render();}));
  listeners.push(onValue(ref(db,"escalas"),s=>{window._escalasDB=s.val()||{};render();}));
}

      <button id="i-btn"

    </div>
  </div>`;

  // Bind events after render
  const crmInput = $("i-crm");
  const senhaInput = $("i-senha");
  if(crmInput){
    crmInput.addEventListener("keydown", e => { if(e.key==="Enter") senhaInput?.focus(); });
    crmInput.addEventListener("touchstart", () => crmInput.focus(), {passive:true});
  }
  if(senhaInput){
    senhaInput.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
    senhaInput.addEventListener("touchstart", () => senhaInput.focus(), {passive:true});
  }
}

window.doLogin=async function(){
  const crm=$("i-crm").value.trim(),senha=$("i-senha").value.trim();
  const err=$("i-err"),btn=$("i-btn");
  if(!crm||!senha){err.style.display="block";err.textContent="⚠ Preencha CRM e senha.";return;}
  err.style.display="none";btn.textContent="Verificando...";btn.disabled=true;
  try{
    const snap=await get(ref(db,`medicos/crm_${crm}`));
    if(!snap.exists()){err.style.display="block";err.textContent="⚠ CRM não encontrado.";btn.textContent="Entrar no Sistema";btn.disabled=false;return;}
    const data=snap.val();
    if(data.senha!==senha){err.style.display="block";err.textContent="⚠ Senha incorreta.";btn.textContent="Entrar no Sistema";btn.disabled=false;return;}
    user={...data,key:`crm_${crm}`};
    sessionStorage.setItem("hemo_user",JSON.stringify(user));
    lastNotifCount=0;
    startListeners();
  }catch(e){err.style.display="block";err.textContent="⚠ Erro de conexão.";btn.textContent="Entrar no Sistema";btn.disabled=false;}
};

window.doLogout=function(){
  user=null;page="dashboard";
  sessionStorage.removeItem("hemo_user");
  stopClock();stopListeners();render();
};

// MINHA ESCALA DO MÊS (Plantonista)
// ══════════════════════════════════════
function htmlMinhaEscala(){
  const now = new Date();
  const viewYear  = window._meYear  !== undefined ? window._meYear  : now.getFullYear();
  const viewMonth = window._meMonth !== undefined ? window._meMonth : now.getMonth();
  window._meYear  = viewYear;
  window._meMonth = viewMonth;

  const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const dayNames   = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const today      = new Date();

  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  // Minhas escalas do mês
  const todasEscalas = Object.entries(window._escalasDB||{}).map(([k,v])=>({...v,key:k}));
  const minhasEscalas = todasEscalas.filter(e =>
    e.medicoKey === user.key && e.year === viewYear && e.month === viewMonth
  );

  const diasComEscala = new Set(minhasEscalas.map(e=>e.day));

  // Stats do mês
  const totalPlantoes = minhasEscalas.length;
  const proximoPlantao = minhasEscalas
    .filter(e => new Date(e.year, e.month, e.day) >= new Date(today.getFullYear(), today.getMonth(), today.getDate()))
    .sort((a,b)=>a.day-b.day)[0];

  // Build calendar cells
  let cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const isToday = d => d && today.getFullYear()===viewYear && today.getMonth()===viewMonth && today.getDate()===d;
  const isPast  = d => d && new Date(viewYear,viewMonth,d) < new Date(today.getFullYear(),today.getMonth(),today.getDate());

  return `<div style="padding:16px">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-weight:800;font-size:18px;color:#1a1a2e">🗓️ Minha Escala</h2>
      <span style="background:#E3F2FD;color:#1565C0;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">${totalPlantoes} plantão${totalPlantoes!==1?"es":""}</span>
    </div>

    <!-- Próximo plantão banner -->
    ${proximoPlantao ? (() => {
      const s = SETORES.find(s=>s.id===proximoPlantao.setorId);
      const diffDays = Math.ceil((new Date(proximoPlantao.year,proximoPlantao.month,proximoPlantao.day)-new Date(today.getFullYear(),today.getMonth(),today.getDate()))/(1000*60*60*24));
      return `<div style="background:linear-gradient(135deg,#1565C0,#7B1FA2);border-radius:16px;padding:16px;margin-bottom:16px;color:#fff">
        <div style="font-size:12px;opacity:.7;font-weight:600;margin-bottom:4px">PRÓXIMO PLANTÃO</div>
        <div style="font-weight:800;font-size:20px;margin-bottom:6px">
          ${proximoPlantao.day === today.getDate() && proximoPlantao.month === today.getMonth() ? "Hoje! 🔥" :
            diffDays === 1 ? "Amanhã ⏰" : `Em ${diffDays} dias`}
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:20px">${s?.icone||"🏥"}</span>
          <span style="font-weight:700;font-size:14px">${s?.nome||proximoPlantao.setorNome}</span>
        </div>
        <div style="font-size:13px;opacity:.85">${proximoPlantao.day.toString().padStart(2,"0")}/${(viewMonth+1).toString().padStart(2,"0")}/${viewYear}</div>
        ${proximoPlantao.turno?`<div style="margin-top:6px;background:rgba(255,255,255,.2);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;display:inline-block">${proximoPlantao.turno}</div>`:""}
      </div>`;
    })() : `<div style="background:#F8FAFC;border-radius:16px;padding:16px;margin-bottom:16px;text-align:center;color:#90A4AE;font-size:13px">
      📭 Nenhum plantão agendado para este mês
    </div>`}

    <!-- Calendar mini -->
    <div class="card" style="padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="changeMeMonth(-1)" style="background:#F0F4F8;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;touch-action:manipulation">‹</button>
        <span style="font-weight:800;font-size:15px;color:#1a1a2e">${monthNames[viewMonth]} ${viewYear}</span>
        <button onclick="changeMeMonth(1)" style="background:#F0F4F8;border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;touch-action:manipulation">›</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:#90A4AE;padding:3px 0">${d}</div>`).join("")}
      </div>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${cells.map(d => {
          if(!d) return `<div></div>`;
          const hasMine = diasComEscala.has(d);
          const isT = isToday(d);
          const iP = isPast(d);
          const myEscalasDia = minhasEscalas.filter(e=>e.day===d);
          const cor = myEscalasDia[0] ? (SETORES.find(s=>s.id===myEscalasDia[0].setorId)?.cor||"#1565C0") : "#1565C0";

          return `<div onclick="openMeuDia(${d},${viewMonth},${viewYear})"
            style="
              aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
              align-items:center;justify-content:center;cursor:pointer;position:relative;
              background:${hasMine ? cor+"22" : isT ? "#1565C0" : "#F8FAFC"};
              border:2px solid ${hasMine ? cor : isT ? "#1565C0" : "transparent"};
              touch-action:manipulation;
            ">
            <div style="font-size:12px;font-weight:${hasMine||isT?"800":"500"};color:${isT&&!hasMine?"#fff":hasMine?cor:iP?"#ccc":"#333"}">${d}</div>
            ${hasMine?`<div style="width:5px;height:5px;border-radius:50%;background:${cor};margin-top:1px"></div>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>

    <!-- Lista detalhada de escalas -->
    <div class="card">
      <div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:14px">Todos os Plantões do Mês</div>
      ${minhasEscalas.length===0
        ? `<div style="text-align:center;padding:24px;color:#aaa">
            <div style="font-size:40px;margin-bottom:8px">📭</div>
            <div style="font-size:14px">Nenhum plantão escalado pelo gestor</div>
            <div style="font-size:12px;margin-top:4px">Aguarde o gestor publicar a escala</div>
          </div>`
        : [...minhasEscalas].sort((a,b)=>a.day-b.day).map(e => {
            const s = SETORES.find(s=>s.id===e.setorId);
            const d = new Date(e.year, e.month, e.day);
            const dow = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"][d.getDay()];
            const isHoje = e.day===today.getDate() && e.month===today.getMonth() && e.year===today.getFullYear();
            const isFuturo = d >= new Date(today.getFullYear(),today.getMonth(),today.getDate());
            return `<div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:${isHoje?"linear-gradient(135deg,#1565C020,#1565C010)":"#F8FAFC"};border:1.5px solid ${isHoje?"#1565C040":"#F0F4F8"}">
              <!-- Day badge -->
              <div style="width:48px;height:54px;border-radius:12px;background:${s?.cor||"#1565C0"};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 3px 8px ${s?.cor||"#1565C0"}44">
                <div style="color:rgba(255,255,255,.8);font-size:10px;font-weight:700;line-height:1">${dow.substring(0,3).toUpperCase()}</div>
                <div style="color:#fff;font-size:22px;font-weight:800;line-height:1">${e.day}</div>
                <div style="color:rgba(255,255,255,.7);font-size:9px;line-height:1">${(e.month+1).toString().padStart(2,"0")}/${e.year.toString().slice(2)}</div>
              </div>
              <!-- Info -->
              <div style="flex:1;min-width:0">

function htmlCalendario(){
  const now = new Date();
  const isGestor = user?.role === "gestor";
  const viewYear = window._calYear || now.getFullYear();
  const viewMonth = window._calMonth !== undefined ? window._calMonth : now.getMonth();
  window._calYear = viewYear;
  window._calMonth = viewMonth;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const dayNames = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const today = new Date();

  // Get escalas for this month
  const escalasMes = Object.entries(window._escalasDB||{})
    .map(([k,v])=>({...v,key:k}))
    .filter(e => e.year===viewYear && e.month===viewMonth);

  // Build calendar grid
  let cells = [];
  for(let i=0; i<firstDay; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const isToday = (d) => d && today.getFullYear()===viewYear && today.getMonth()===viewMonth && today.getDate()===d;
  const isPast = (d) => d && new Date(viewYear, viewMonth, d) < new Date(today.getFullYear(), today.getMonth(), today.getDate());

  const getDayEscala = (d) => escalasMes.filter(e => e.day === d);

  return `
  <div style="padding:16px">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-weight:800;font-size:18px;color:#1a1a2e">📆 Calendário</h2>
      ${isGestor?`<button class="btn btn-blue" style="padding:8px 14px;font-size:12px" onclick="openModal('novaEscala')">+ Escalar</button>`:""}
    </div>

    <!-- Month nav -->
    <div class="card" style="padding:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button onclick="changeCalMonth(-1)" style="background:none;border:none;font-size:24px;cursor:pointer;color:#1565C0;padding:4px 8px;border-radius:8px;touch-action:manipulation">‹</button>
        <div style="text-align:center">
          <div style="font-weight:800;font-size:17px;color:#1a1a2e">${monthNames[viewMonth]}</div>
          <div style="font-size:12px;color:#90A4AE">${viewYear}</div>
        </div>
        <button onclick="changeCalMonth(1)" style="background:none;border:none;font-size:24px;cursor:pointer;color:#1565C0;padding:4px 8px;border-radius:8px;touch-action:manipulation">›</button>
      </div>

      <!-- Day headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#90A4AE;padding:4px 0">${d}</div>`).join("")}
      </div>

      <!-- Day cells -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${cells.map(d => {
          if(!d) return `<div></div>`;
          const dayEscala = getDayEscala(d);
          const hasEscala = dayEscala.length > 0;
          const isT = isToday(d);
          const iP = isPast(d);
          const colors = dayEscala.slice(0,3).map(e => {
            const s = SETORES.find(s=>s.id===e.setorId);
            return s?.cor||"#1565C0";
          });

          return `<div onclick="openDayModal(${d},${viewMonth},${viewYear})"
            style="
              aspect-ratio:1;
              border-radius:10px;
              display:flex;
              flex-direction:column;
              align-items:center;
              justify-content:center;
              cursor:pointer;
              position:relative;
              background:${isT?"#1565C0":hasEscala?"#E3F2FD":"#F8FAFC"};
              border:${isT?"2px solid #1565C0":"2px solid transparent"};
              touch-action:manipulation;
              transition:all .15s;
              padding:2px;
            "
          >
            <div style="font-size:13px;font-weight:${isT?"800":"600"};color:${isT?"#fff":iP?"#aaa":"#1a1a2e"}">${d}</div>
            ${hasEscala ? `<div style="display:flex;gap:1px;margin-top:2px">
              ${colors.map(c=>`<div style="width:5px;height:5px;border-radius:50%;background:${isT?"rgba(255,255,255,.8)":c}"></div>`).join("")}
              ${dayEscala.length>3?`<div style="width:5px;height:5px;border-radius:50%;background:${isT?"rgba(255,255,255,.5)":"#aaa"}"></div>`:""}
            </div>`:""}
          </div>`;
        }).join("")}
      </div>
    </div>

    <!-- Legend -->
    <div class="card" style="padding:12px">
      <div style="font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:10px">Legenda</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:50%;background:#1565C0"></div><span style="font-size:12px;color:#555">Hoje</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:50%;background:#E3F2FD;border:1px solid #90CAF9"></div><span style="font-size:12px;color:#555">Com escala</span></div>
        ${SETORES.map(s=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:${s.cor}"></div><span style="font-size:11px;color:#555">${s.nome}</span></div>`).join("")}
      </div>
    </div>

    <!-- Próximas escalas -->
    <div class="card">
      <div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:12px">📋 Escalas do Mês (${escalasMes.length})</div>
      ${escalasMes.length===0?`<div style="color:#aaa;text-align:center;padding:16px;font-size:13px">Nenhuma escala registrada neste mês</div>`:
      [...escalasMes].sort((a,b)=>a.day-b.day).map(e=>{
        const s = SETORES.find(s=>s.id===e.setorId);
        const medico = medicosDB[e.medicoKey];
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5F7FA">
          <div style="width:36px;height:36px;border-radius:10px;background:${s?.cor||"#1565C0"}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${s?.icone||"📅"}</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px;color:#1a1a2e">${medico?.nome?.split(" ").slice(0,3).join(" ")||e.medicoNome}</div>
            <div style="font-size:12px;color:#90A4AE">${s?.nome||e.setorNome} · Dia ${e.day}/${(viewMonth+1).toString().padStart(2,"0")}</div>
            ${e.obs?`<div style="font-size:11px;color:#888;margin-top:2px;font-style:italic">${e.obs}</div>`:""}
          </div>
          ${user?.role==="gestor"?`<button onclick="deletarEscala('${e.key}')" style="background:none;border:none;color:#EF5350;font-size:18px;cursor:pointer;padding:4px">×</button>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

window.changeCalMonth = function(delta){
  let m = (window._calMonth||0) + delta;
  let y = window._calYear || new Date().getFullYear();
  if(m>11){m=0;y++;}
  if(m<0){m=11;y--;}
  window._calMonth=m;
  window._calYear=y;
  render();
};

window.salvarEscalaCalendario = async function(day, month, year){
  const mk=$("dc-med")?.value, sk=$("dc-set")?.value;
  if(!mk||!sk){toast("Selecione médico e setor!","⚠️");return;}
  const med=medicosDB[mk];
  const set=SETORES.find(s=>s.id===sk);
  const turno=$("dc-turno")?.value||"";
  const obs=$("dc-obs")?.value||"";
  await push(ref(db,"escalas"),{
    medicoKey:mk, medicoNome:med.nome, medicoCrm:med.crm,
    setorId:sk, setorNome:set.nome,
    day, month, year, turno, obs,
    criadoPor:user.nome, criadoEm:nowStr()
  });
  toast(`${med.nome.split(" ")[0]} escalado para dia ${day}!`,"📅");
  closeModal();
  openDayModal(day, month, year);
};

window.uploadFoto=function(input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>500000){ toast("Foto muito grande! Use uma menor que 500KB","⚠️"); return; }
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result;
    await update(ref(db,`medicos/${user.key}`),{foto:b64});
    user={...user,foto:b64};
    sessionStorage.setItem("hemo_user",JSON.stringify(user));
    toast("Foto atualizada!","📷");
    render();
  };
  reader.readAsDataURL(file);
};

window.gerarRelatorio=function(tipo){
  const plantoes=Object.values(plantoesDB);
  const medicos=Object.values(medicosDB).filter(m=>m.role!=="gestor");
  const hoje=new Date().toLocaleDateString("pt-BR");
  let linhas=[];
  if(tipo==="chegada") linhas=["RELATÓRIO DE CHEGADA — "+hoje,"=".repeat(60),...plantoes.map(p=>`${p.medicoNome} | CRM ${p.medicoCrm} | ${p.setorNome} | ${fmtTime(p.inicio)}`)];
  else if(tipo==="fechamento") linhas=["RELATÓRIO DE FECHAMENTO — "+hoje,"=".repeat(60),...plantoes.filter(p=>p.fim).map(p=>`${p.medicoNome} | CRM ${p.medicoCrm} | ${p.setorNome} | ${fmtTime(p.inicio)} → ${fmtTime(p.fim)} | ${durStr(p.inicio,p.fim)}`)];
  else if(tipo==="completo"){ linhas=["RELATÓRIO COMPLETO","=".repeat(60)]; plantoes.forEach(p=>{linhas.push(`[${p.status.toUpperCase()}] ${p.medicoNome} CRM ${p.medicoCrm}`);linhas.push(`  Setor: ${p.setorNome} | Início: ${fmtTime(p.inicio)} | Fim: ${fmtTime(p.fim)} | ${durStr(p.inicio,p.fim)}`);linhas.push("");}); }
  else if(tipo==="ausencias"){ const cp=new Set(plantoes.map(p=>p.medicoKey)); linhas=["RELATÓRIO DE AUSÊNCIAS — "+hoje,"=".repeat(60),...medicos.filter(m=>!cp.has(m.key||`crm_${m.crm}`)).map(m=>`${m.nome} | CRM ${m.crm}`)]; }
  const blob=new Blob([linhas.join("\n")],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`relatorio_${tipo}_${hoje.replace(/\//g,"-")}.txt`; a.click();
  toast("Relatório gerado!","📊");
};

// ── MODALS ──
window.openModal=function(tipo,key){
  const mr=$("modal-root");
  const medicos=Object.entries(medicosDB).map(([k,v])=>({...v,key:k})).filter(m=>m.role!=="gestor");

  if(tipo==="novoPlantao"){
    mr.innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head"><span style="font-weight:800;font-size:16px">Iniciar Plantão</span><button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1">×</button></div>
      <div class="modal-body">
        <label>Selecionar Médico</label>
        <select id="m-med"><option value="">Selecione o médico...</option>${medicos.map(m=>`<option value="${m.key}">${m.nome} — CRM ${m.crm}</option>`).join("")}</select>
        <label>Setor</label>
        <select id="m-set"><option value="">Selecione o setor...</option>${SETORES.map(s=>`<option value="${s.id}">${s.icone} ${s.nome}</option>`).join("")}</select>
        <div style="display:flex;gap:8px;margin-top:20px">
          <button class="btn btn-green" style="flex:1;padding:13px" onclick="salvarPlantao()">✅ Iniciar</button>
          <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div></div>`;

  } else if(tipo==="novoMedico"){
    mr.innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head"><span style="font-weight:800;font-size:16px">Novo Médico</span><button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1">×</button></div>
      <div class="modal-body">
        <label>Nome completo</label><input id="m-nome" placeholder="Dr(a). Nome Sobrenome"/>
        <label>CRM (só números)</label><input id="m-crm" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 19644"/>
        <label>Matrícula</label><input id="m-mat" placeholder="Ex: 929.841-0"/>
        <label>Setor</label><select id="m-set2"><option value="">Sem setor</option>${SETORES.map(s=>`<option value="${s.nome}">${s.icone} ${s.nome}</option>`).join("")}</select>
        <label>Senha inicial</label><input id="m-sen" value="1234"/>
        <div style="display:flex;gap:8px;margin-top:20px">
          <button class="btn btn-blue" style="flex:1;padding:13px" onclick="salvarMedico()">Salvar</button>
          <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div></div>`;

  } else if(tipo==="editMedico" && key){
    const m=medicosDB[key];
    if(!m) return;
    mr.innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head"><span style="font-weight:800;font-size:16px">Editar Médico</span><button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1">×</button></div>
      <div class="modal-body">
        <div style="text-align:center;margin-bottom:16px">
          <div style="position:relative;width:80px;height:80px;margin:0 auto">
            <div style="width:80px;height:80px;border-radius:50%;overflow:hidden;border:3px solid #E8EDF5">
              ${m.foto?`<img src="${m.foto}" style="width:100%;height:100%;object-fit:cover"/>`:
              `<div style="width:100%;height:100%;background:${stringToColor(m.nome)};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:24px">${initials(m.nome)}</div>`}
            </div>
            <label style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:#1565C0;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;margin:0">
              📷<input type="file" accept="image/*" style="display:none" onchange="uploadFotoMedico('${key}',this)"/>
            </label>
          </div>
          <div style="font-weight:700;margin-top:8px;font-size:15px;color:#1a1a2e">${m.nome}</div>
          <div style="color:#90A4AE;font-size:12px">CRM ${m.crm}</div>
        </div>
        <label>Setor</label>
        <select id="em-setor" onchange="editarSetor('${key}',this.value)">
          <option value="">Sem setor</option>
          ${SETORES.map(s=>`<option value="${s.nome}" ${m.setor===s.nome?"selected":""}>${s.icone} ${s.nome}</option>`).join("")}
        </select>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-success" style="flex:1" onclick="resetSenha('${key}','${m.nome}')">🔐 Reset Senha</button>
          <button class="btn btn-gray" onclick="closeModal()">Fechar</button>
        </div>
      </div>
    </div></div>`;

  } else if(tipo==="novoAnuncio"){
    mr.innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head"><span style="font-weight:800;font-size:16px">Publicar Anúncio</span><button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1">×</button></div>
      <div class="modal-body">
        <label>Título</label><input id="a-titulo" placeholder="Ex: Reunião às 8h amanhã"/>
        <label>Mensagem</label><textarea id="a-texto" rows="3" placeholder="Detalhes do anúncio..."></textarea>
        <label>Tipo</label>
        <select id="a-cor">
          <option value="#2196F3">🔵 Informação</option>
          <option value="#F44336">🔴 Urgente</option>
          <option value="#FF9800">🟠 Aviso</option>
          <option value="#4CAF50">🟢 Positivo</option>
        </select>
        <div style="background:#FFF3E0;border-radius:10px;padding:10px 12px;margin-top:12px;font-size:12px;color:#E65100">
          🔔 Os plantonistas receberão notificação sonora imediata!
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-blue" style="flex:1;padding:13px" onclick="salvarAnuncio()">📢 Publicar Agora</button>
          <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div></div>`;

  } else if(tipo==="novaEscala"){
    // Open calendar page and then show day modal for today
    goPage("calendario");
    setTimeout(()=>{ const now=new Date(); openDayModal(now.getDate(), now.getMonth(), now.getFullYear()); }, 200);
    return;
  } else if(tipo==="alterarSenha"){
    mr.innerHTML=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head"><span style="font-weight:800;font-size:16px">Alterar Senha</span><button onclick="closeModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1">×</button></div>
      <div class="modal-body">
        <label>Senha atual</label><input id="s-atual" type="password" placeholder="••••"/>
        <label>Nova senha</label><input id="s-nova" type="password" placeholder="Nova senha"/>
        <label>Confirmar</label><input id="s-conf" type="password" placeholder="Confirme a nova senha"/>
        <div id="s-err" style="display:none;background:#FFEBEE;color:#C62828;border-radius:8px;padding:10px;font-size:13px;margin-top:10px"></div>
        <button class="btn btn-blue btn-full" style="margin-top:16px" onclick="alterarSenha()">Salvar Nova Senha</button>
      </div>
    </div></div>`;
  }
};

window.closeModal=function(){const mr=$("modal-root");if(mr)mr.innerHTML="";};

window.alterarSenha=async function(){
  const atual=$("s-atual")?.value, nova=$("s-nova")?.value, conf=$("s-conf")?.value;
  const err=$("s-err");
  if(atual!==user.senha){err.style.display="block";err.textContent="Senha atual incorreta.";return;}
  if(nova!==conf){err.style.display="block";err.textContent="As senhas não coincidem.";return;}
  if(nova.length<4){err.style.display="block";err.textContent="Senha muito curta (mínimo 4 caracteres).";return;}
  await update(ref(db,`medicos/${user.key}`),{senha:nova});
  user={...user,senha:nova};
  sessionStorage.setItem("hemo_user",JSON.stringify(user));
  closeModal();
  toast("Senha alterada com sucesso!","🔐");
};

window.salvarPlantao=async function(){
  const mk=$("m-med")?.value, sk=$("m-set")?.value;
  if(!mk||!sk){toast("Selecione médico e setor!","⚠️");return;}
  const med=medicosDB[mk], set=SETORES.find(s=>s.id===sk);
  await push(ref(db,"plantoes"),{medicoKey:mk,medicoNome:med.nome,medicoCrm:med.crm,setorId:sk,setorNome:set.nome,status:"ativo",inicio:new Date().toISOString(),fim:null});
  await push(ref(db,"notificacoes"),{tipo:"inicio",texto:`${med.nome} iniciou plantão em ${set.nome}`,hora:nowStr(),cor:"green"});
  closeModal();
  toast(`${med.nome.split(" ")[0]} iniciado!`,"✅");
};

window.salvarMedico=async function(){
  const nome=$("m-nome")?.value.trim(), crm=$("m-crm")?.value.trim();
  if(!nome||!crm){toast("Nome e CRM obrigatórios!","⚠️");return;}
  await set(ref(db,`medicos/crm_${crm}`),{crm,nome,matricula:$("m-mat")?.value||"",funcao:"Médico(a)",setor:$("m-set2")?.value||"",role:"plantonista",senha:$("m-sen")?.value||"1234",foto:""});
  closeModal();
  toast(`${nome.split(" ")[0]} cadastrado!`,"✅");
};

window.salvarAnuncio=async function(){
  const titulo=$("a-titulo")?.value.trim(), texto=$("a-texto")?.value.trim();
  if(!titulo||!texto){toast("Preencha título e mensagem!","⚠️");return;}
  await push(ref(db,"anuncios"),{titulo,texto,cor:$("a-cor")?.value||"#2196F3",hora:nowStr(),autor:user.nome});
  closeModal();
  toast("Anúncio publicado para todos!","📢");
};

window.uploadFotoMedico=async function(key,input){
  const file=input.files[0];
  if(!file) return;
  if(file.size>500000){toast("Foto muito grande! Máx 500KB","⚠️");return;}
  const reader=new FileReader();
  reader.onload=async e=>{
    await update(ref(db,`medicos/${key}`),{foto:e.target.result});
    toast("Foto do médico atualizada!","📷");
    closeModal();
  };
  reader.readAsDataURL(file);
};

// ── CLOCK ──
function startClock(){
  stopClock();
  clockTick=setInterval(()=>{
    const el=$("clock");
    if(el) el.textContent=new Date().toLocaleString("pt-BR");
    else return;
    const dur=$("dur-live");
    if(dur){
      const ativo=Object.entries(plantoesDB).map(([k,v])=>({...v,key:k})).find(p=>p.medicoKey===user?.key&&p.status==="ativo");
      if(ativo) dur.textContent=durStr(ativo.inicio,null);
    }
  },1000);
}

// ── INIT ──
async function init(){
  await seedIfEmpty();
  if(user) startListeners();
  else render();
}
init();
</script>
